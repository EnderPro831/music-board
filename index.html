<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Board</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F7F6F3;--surface:#FFF;--surface-hover:#F1F0EE;
  --border:#E8E6E1;--border-strong:#C9C6C0;
  --text:#1A1816;--text-muted:#837D75;--text-light:#B0A99F;
  --accent:#2F6FED;--accent-soft:#EBF1FD;
  --green:#1D8348;--green-soft:#E9F7EF;
  --red:#C0392B;--red-soft:#FDEDEC;
  --tag-bg:#F0EDE8;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06);
  --shadow-md:0 4px 16px rgba(0,0,0,.08);
  --shadow-lg:0 12px 40px rgba(0,0,0,.12);
  --radius:8px;--radius-lg:12px;
}
body.dark{
  --bg:#111110;--surface:#1A1917;--surface-hover:#222120;
  --border:#2C2B28;--border-strong:#3E3D39;
  --text:#F0EDE8;--text-muted:#8A847C;--text-light:#555047;
  --accent:#4D8FF0;--accent-soft:#1A2A45;
  --green:#4CAF7D;--green-soft:#0E2218;
  --red:#E05C4B;--red-soft:#2A1210;
  --tag-bg:#222120;
  --shadow-sm:0 1px 3px rgba(0,0,0,.3);
  --shadow-md:0 4px 16px rgba(0,0,0,.4);
  --shadow-lg:0 12px 40px rgba(0,0,0,.6);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;transition:background .25s,color .15s}

/* LOADING */
#loadingScreen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:200;transition:opacity .4s}
#loadingScreen.hidden{opacity:0;pointer-events:none}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--text-muted);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loadingScreen p{font-size:.7rem;color:var(--text-muted);letter-spacing:.06em;text-transform:uppercase}

/* HEADER */
.page-header{padding:52px 48px 24px;max-width:1200px;margin:0 auto}
.page-header-inner{display:flex;align-items:flex-end;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.page-emoji{font-size:2.8rem;line-height:1;margin-bottom:8px;display:block}
.page-title{font-family:'Instrument Serif',serif;font-size:2.6rem;font-weight:400;letter-spacing:-.5px;line-height:1.1}
.page-subtitle{font-size:.72rem;color:var(--text-muted);margin-top:6px;letter-spacing:.04em;text-transform:uppercase}
.header-actions{display:flex;align-items:center;gap:8px}

/* SYNC */
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse-dot 2.5s ease infinite}
.sync-dot.syncing{animation:spin 1s linear infinite;background:var(--accent);box-shadow:none}
.sync-dot.error{background:var(--red);animation:none;box-shadow:none}
@keyframes pulse-dot{0%,100%{box-shadow:0 0 0 0 rgba(76,175,125,.4)}50%{box-shadow:0 0 0 5px rgba(76,175,125,0)}}

/* ICON BTN */
.icon-btn{display:flex;align-items:center;gap:8px;padding:7px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;font-family:'DM Mono',monospace;font-size:.72rem;color:var(--text-muted);transition:all .15s;letter-spacing:.03em}
.icon-btn:hover{background:var(--surface-hover);color:var(--text)}
.icon-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.icon-btn svg{width:13px;height:13px;flex-shrink:0}

/* DIVIDER / TOOLBAR */
.page-divider{max-width:1200px;margin:0 auto;padding:0 48px}
.divider-line{border:none;border-top:1px solid var(--border)}
.toolbar{max-width:1200px;margin:0 auto;padding:14px 48px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.filter-btn{display:flex;align-items:center;gap:5px;padding:5px 12px;border:1px solid var(--border);background:var(--surface);border-radius:20px;cursor:pointer;font-family:'DM Mono',monospace;font-size:.7rem;color:var(--text-muted);transition:all .15s;letter-spacing:.03em}
.filter-btn:hover{background:var(--surface-hover);color:var(--text)}
.filter-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.filter-btn .dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.6}
.count-badge{font-size:.65rem;color:var(--text-light);margin-left:auto;letter-spacing:.04em}

/* GRID */
.grid{max-width:1200px;margin:0 auto;padding:20px 48px 48px;display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}

/* CARD */
.card{background:var(--surface);display:flex;flex-direction:column;transition:background .12s;animation:fadeUp .3s ease both;position:relative}
.card:hover{background:var(--surface-hover)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card-cover{width:100%;aspect-ratio:1/1;object-fit:cover;display:block;border-bottom:1px solid var(--border);background:var(--tag-bg)}
.card-cover-placeholder{width:100%;aspect-ratio:1/1;background:var(--tag-bg);display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--border);font-size:2rem;color:var(--text-light)}
.card-body{padding:14px 16px 16px;display:flex;flex-direction:column;gap:4px;flex:1}
.card-title{font-family:'Instrument Serif',serif;font-size:1.05rem;font-weight:400;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-artist{font-size:.68rem;color:var(--text-muted);letter-spacing:.04em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;gap:6px}
.link-btn{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:var(--tag-bg);border:1px solid var(--border);border-radius:4px;text-decoration:none;font-family:'DM Mono',monospace;font-size:.63rem;color:var(--text-muted);letter-spacing:.04em;transition:all .12s}
.link-btn:hover{background:var(--text);color:var(--bg);border-color:var(--text)}
.link-btn svg{width:10px;height:10px;flex-shrink:0}
.listened-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-size:.6rem;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;border:none;font-family:'DM Mono',monospace;transition:all .12s;flex-shrink:0}
.listened-badge.yes{background:var(--green-soft);color:var(--green)}
.listened-badge.no{background:var(--tag-bg);color:var(--text-muted)}
.listened-badge:hover{filter:brightness(.94)}

/* ADMIN OVERLAY */
.card-admin-actions{position:absolute;top:8px;right:8px;display:none;gap:4px}
body.admin-mode .card-admin-actions{display:flex}
.card-icon-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:rgba(255,255,255,.92);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;backdrop-filter:blur(4px)}
body.dark .card-icon-btn{background:rgba(26,25,23,.92)}
.card-icon-btn:hover{background:var(--text);color:white;border-color:var(--text)}
.card-icon-btn svg{width:13px;height:13px}

/* ADD CARD */
.add-card{background:var(--surface);display:none;align-items:center;justify-content:center;cursor:pointer;transition:background .12s;min-height:200px;border:2px dashed transparent}
body.admin-mode .add-card{display:flex}
.add-card:hover{background:var(--accent-soft);border-color:var(--accent)}
.add-card-inner{display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--text-light);transition:color .12s}
.add-card:hover .add-card-inner{color:var(--accent)}
.add-card-inner svg{width:22px;height:22px}
.add-card-inner span{font-size:.7rem;letter-spacing:.06em;text-transform:uppercase}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);width:100%;max-width:480px;transform:translateY(12px) scale(.98);transition:transform .2s,background .25s;border:1px solid var(--border)}
.modal-overlay.open .modal{transform:translateY(0) scale(1)}
.modal-header{padding:20px 24px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.modal-title{font-family:'Instrument Serif',serif;font-size:1.2rem;font-weight:400}
.modal-close{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:all .12s}
.modal-close:hover{background:var(--surface-hover);color:var(--text)}
.modal-close svg{width:14px;height:14px}
.modal-body{padding:20px 24px;display:flex;flex-direction:column;gap:14px;max-height:72vh;overflow-y:auto}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}

/* SEARCH INPUT */
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--text-muted);pointer-events:none}
.search-input{width:100%;padding:9px 12px 9px 32px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);font-family:'DM Mono',monospace;font-size:.8rem;outline:none;transition:border-color .12s}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--text-light)}

/* SEARCH RESULTS */
.search-results{display:flex;flex-direction:column;gap:2px;max-height:280px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface)}
.search-results:empty{display:none}
.result-item{display:flex;align-items:center;gap:10px;padding:8px 10px;cursor:pointer;transition:background .1s;border-radius:0}
.result-item:hover{background:var(--surface-hover)}
.result-item:first-child{border-radius:var(--radius) var(--radius) 0 0}
.result-item:last-child{border-radius:0 0 var(--radius) var(--radius)}
.result-item.selected{background:var(--accent-soft);outline:2px solid var(--accent);outline-offset:-2px}
.result-thumb{width:40px;height:40px;object-fit:cover;border-radius:4px;flex-shrink:0;background:var(--tag-bg)}
.result-info{flex:1;min-width:0}
.result-title{font-size:.78rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'Instrument Serif',serif}
.result-artist{font-size:.63rem;color:var(--text-muted);letter-spacing:.03em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.result-check{width:16px;height:16px;color:var(--accent);flex-shrink:0;display:none}
.result-item.selected .result-check{display:block}

/* SEARCH STATES */
.search-state{padding:20px;text-align:center;font-size:.7rem;color:var(--text-muted);letter-spacing:.04em}
.search-state svg{width:20px;height:20px;margin:0 auto 8px;display:block;opacity:.4}

/* SELECTED PREVIEW */
.selected-preview{display:none;align-items:center;gap:12px;padding:12px;background:var(--accent-soft);border:1px solid var(--accent);border-radius:var(--radius)}
.selected-preview.visible{display:flex}
.selected-preview img{width:48px;height:48px;object-fit:cover;border-radius:6px;flex-shrink:0}
.selected-preview-info{flex:1;min-width:0}
.selected-preview-title{font-family:'Instrument Serif',serif;font-size:.95rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.selected-preview-artist{font-size:.65rem;color:var(--accent);letter-spacing:.04em;text-transform:uppercase;margin-top:2px}
.selected-clear{background:none;border:none;cursor:pointer;color:var(--text-muted);padding:4px;border-radius:4px;transition:color .12s;flex-shrink:0}
.selected-clear:hover{color:var(--red)}
.selected-clear svg{width:14px;height:14px}

/* FIELDS / BUTTONS */
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:.65rem;color:var(--text-muted);letter-spacing:.08em;text-transform:uppercase}
.field input{padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);font-family:'DM Mono',monospace;font-size:.8rem;outline:none;transition:border-color .12s}
.field input:focus{border-color:var(--accent)}
.field input::placeholder{color:var(--text-light)}
.btn{padding:7px 16px;border-radius:var(--radius);border:1px solid var(--border);font-family:'DM Mono',monospace;font-size:.72rem;cursor:pointer;transition:all .12s;letter-spacing:.03em}
.btn-ghost{background:transparent;color:var(--text-muted)}
.btn-ghost:hover{background:var(--surface-hover);color:var(--text)}
.btn-primary{background:var(--text);color:var(--bg);border-color:var(--text)}
.btn-primary:hover{opacity:.85}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-danger{background:var(--red-soft);color:var(--red);border-color:transparent}
.btn-danger:hover{background:var(--red);color:white}

/* PW MODAL */
.pw-modal .modal-body p{font-size:.75rem;color:var(--text-muted);line-height:1.6}
.pw-error{font-size:.68rem;color:var(--red);display:none}
.pw-error.visible{display:block}

/* DELETE */
.delete-modal .modal-body{align-items:center;text-align:center}
.delete-modal .modal-body p{font-size:.78rem;color:var(--text-muted);line-height:1.6}
.del-emoji{font-size:2rem}

/* EMPTY */
.empty-state{grid-column:1/-1;padding:60px 20px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px}
.empty-state-emoji{font-size:2.5rem}
.empty-state h3{font-family:'Instrument Serif',serif;font-weight:400;font-size:1.2rem;color:var(--text-muted)}
.empty-state p{font-size:.7rem;color:var(--text-light)}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--text);color:var(--bg);padding:8px 18px;border-radius:20px;font-size:.7rem;letter-spacing:.04em;opacity:0;pointer-events:none;transition:all .25s;z-index:300;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:720px){
  .page-header{padding:32px 20px 16px}
  .page-divider{padding:0 20px}
  .toolbar{padding:10px 20px}
  .grid{margin:0 20px 40px;padding:0}
  .page-title{font-size:2rem}
}
</style>
</head>
<body>

<div id="loadingScreen"><div class="spinner"></div><p>Cargando canciones…</p></div>
<div class="toast" id="toast"></div>

<div class="page-header">
  <div class="page-header-inner">
    <div>
      <span class="page-emoji">🎵</span>
      <h1 class="page-title">Music Board</h1>
      <p class="page-subtitle">Canciones recomendadas · <span id="totalCount">0</span> entradas</p>
    </div>
    <div class="header-actions">
      <div class="sync-dot" id="syncDot" title="Sincronizado"></div>
      <button class="icon-btn" id="themeToggle">
        <svg id="themeIcon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"></svg>
      </button>
      <button class="icon-btn" id="adminToggle">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="5" height="5" rx="1"/><rect x="9" y="2" width="5" height="5" rx="1"/><rect x="2" y="9" width="5" height="5" rx="1"/><rect x="9" y="9" width="5" height="5" rx="1"/></svg>
        Editar
      </button>
    </div>
  </div>
</div>

<div class="page-divider"><hr class="divider-line"></div>

<div class="toolbar">
  <button class="filter-btn active" data-filter="all"><span class="dot"></span>Todas</button>
  <button class="filter-btn" data-filter="not"><span class="dot"></span>Sin escuchar</button>
  <button class="filter-btn" data-filter="yes"><span class="dot"></span>Escuchadas</button>
  <span class="count-badge" id="filterCount"></span>
</div>

<div class="grid" id="songGrid"></div>

<!-- ADD / EDIT MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Añadir canción</span>
      <button class="modal-close" id="modalClose"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="3" x2="13" y2="13"/><line x1="13" y1="3" x2="3" y2="13"/></svg></button>
    </div>
    <div class="modal-body">

      <!-- Selected preview -->
      <div class="selected-preview" id="selectedPreview">
        <img id="previewImg" src="" alt="">
        <div class="selected-preview-info">
          <div class="selected-preview-title" id="previewTitle"></div>
          <div class="selected-preview-artist" id="previewArtist"></div>
        </div>
        <button class="selected-clear" id="clearSelection" title="Cambiar">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="3" x2="13" y2="13"/><line x1="13" y1="3" x2="3" y2="13"/></svg>
        </button>
      </div>

      <!-- Search -->
      <div id="searchSection">
        <div class="search-wrap">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6.5" cy="6.5" r="4"/><line x1="10" y1="10" x2="14" y2="14"/></svg>
          <input class="search-input" id="searchInput" type="text" placeholder="Busca una canción o artista…" autocomplete="off">
        </div>

        <div id="searchResults" class="search-results" style="margin-top:8px"></div>
      </div>

      <!-- Manual override (collapsed by default) -->
      <details id="manualSection" style="margin-top:4px">
        <summary style="font-size:.68rem;color:var(--text-muted);cursor:pointer;letter-spacing:.04em;text-transform:uppercase;list-style:none;display:flex;align-items:center;gap:6px">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="width:11px;height:11px"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg>
          Editar manualmente
        </summary>
        <div style="display:flex;flex-direction:column;gap:10px;margin-top:12px">
          <div class="field"><label>Título</label><input type="text" id="manualTitle" placeholder="Título de la canción"></div>
          <div class="field"><label>Artista</label><input type="text" id="manualArtist" placeholder="Artista"></div>
          <div class="field"><label>URL portada</label><input type="url" id="manualCover" placeholder="https://…"></div>
          <div class="field"><label>Link</label><input type="url" id="manualLink" placeholder="https://open.spotify.com/…"></div>
        </div>
      </details>

    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="modalCancel">Cancelar</button>
      <button class="btn btn-primary" id="modalSave" disabled>Añadir</button>
    </div>
  </div>
</div>

<!-- PASSWORD MODAL -->
<div class="modal-overlay" id="pwOverlay">
  <div class="modal pw-modal">
    <div class="modal-header">
      <span class="modal-title">Modo edición</span>
      <button class="modal-close" id="pwClose"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="3" x2="13" y2="13"/><line x1="13" y1="3" x2="3" y2="13"/></svg></button>
    </div>
    <div class="modal-body">
      <p>Introduce la contraseña de admin para editar las canciones.</p>
      <div class="field"><label>Contraseña</label><input type="password" id="pwInput" placeholder="••••••••"></div>
      <span class="pw-error" id="pwError">Contraseña incorrecta</span>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="pwCancel">Cancelar</button>
      <button class="btn btn-primary" id="pwConfirm">Entrar</button>
    </div>
  </div>
</div>

<!-- DELETE MODAL -->
<div class="modal-overlay" id="deleteOverlay">
  <div class="modal delete-modal">
    <div class="modal-header">
      <span class="modal-title">Eliminar canción</span>
      <button class="modal-close" id="deleteClose"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="3" x2="13" y2="13"/><line x1="13" y1="3" x2="3" y2="13"/></svg></button>
    </div>
    <div class="modal-body">
      <span class="del-emoji">🗑️</span>
      <p>¿Seguro que quieres eliminar <strong id="deleteSongName"></strong>? Esta acción no se puede deshacer.</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="deleteCancelBtn">Cancelar</button>
      <button class="btn btn-danger" id="deleteConfirmBtn">Eliminar</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, doc, onSnapshot, setDoc, deleteDoc, updateDoc }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ─────────────────────────────────────────────────────────────────
// 🔑 CAMBIA ESTA CONTRASEÑA antes de publicar

// ─────────────────────────────────────────────────────────────────

  authDomain: "music-board-469c2.firebaseapp.com",
  projectId: "music-board-469c2",
  storageBucket: "music-board-469c2.firebasestorage.app",
  messagingSenderId: "270546101581",
  appId: "1:270546101581:web:c038456df4664bd21bc304"
};

const app      = initializeApp(firebaseConfig);
const db       = getFirestore(app);
const songsCol = collection(db, "songs");

// ── STATE ─────────────────────────────────────────────────────────
let songs      = [];
let filter     = "all";
let adminMode  = false;
let deletingId = null;
let darkMode   = localStorage.getItem('mb_dark') === 'true';
let selectedTrack = null; // iTunes result chosen
let searchTimer   = null;

// ── ELEMENTS ──────────────────────────────────────────────────────
const grid          = document.getElementById('songGrid');
const totalCountEl  = document.getElementById('totalCount');
const filterCountEl = document.getElementById('filterCount');
const syncDot       = document.getElementById('syncDot');
const loadingScreen = document.getElementById('loadingScreen');

// ── HELPERS ───────────────────────────────────────────────────────
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}
function setSyncing(v){ syncDot.className='sync-dot'+(v?' syncing':''); }
function setError()   { syncDot.className='sync-dot error'; }

// ── FIRESTORE REALTIME ────────────────────────────────────────────
let firstLoad=true;
onSnapshot(songsCol, snap=>{
  songs=snap.docs.map(d=>({id:d.id,...d.data()}));
  songs.sort((a,b)=>(a.order??0)-(b.order??0));
  if(firstLoad){ loadingScreen.classList.add('hidden'); firstLoad=false; }
  render();
}, err=>{ console.error(err); setError(); loadingScreen.classList.add('hidden'); });

// ── RENDER ────────────────────────────────────────────────────────
function render(){
  grid.innerHTML='';
  const visible=songs.filter(s=>{
    if(filter==='not') return !s.listened;
    if(filter==='yes') return !!s.listened;
    return true;
  });
  totalCountEl.textContent=songs.length;
  filterCountEl.textContent=filter==='all'?'':`${visible.length} visible${visible.length!==1?'s':''}`;

  if(!visible.length&&!adminMode){
    const empty=document.createElement('div');
    empty.className='empty-state';
    empty.innerHTML=`<span class="empty-state-emoji">🎧</span><h3>No hay canciones aquí</h3><p>Prueba otro filtro</p>`;
    grid.appendChild(empty);
  }

  visible.forEach((song,i)=>{
    const card=document.createElement('div');
    card.className='card';
    card.style.animationDelay=`${i*35}ms`;
    card.innerHTML=`
      ${song.cover?`<img class="card-cover" src="${esc(song.cover)}" alt="${esc(song.title)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:``}
      <div class="card-cover-placeholder" style="display:${song.cover?'none':'flex'}">🎵</div>
      <div class="card-admin-actions">
        <button class="card-icon-btn delete-btn" title="Eliminar">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="3 5 13 5"/><path d="M6 5V3h4v2"/><rect x="4" y="5" width="8" height="9" rx="1"/></svg>
        </button>
      </div>
      <div class="card-body">
        <div class="card-title">${esc(song.title)}</div>
        <div class="card-artist">${esc(song.artist)}</div>
        <div class="card-footer">
          ${song.link
            ?`<a class="link-btn" href="${esc(song.link)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
                Escuchar</a>`
            :`<span></span>`}
          <button class="listened-badge ${song.listened?'yes':'no'}">${song.listened?'✓ Sí':'— No'}</button>
        </div>
      </div>`;

    card.querySelector('.listened-badge').addEventListener('click', async e=>{
      e.stopPropagation();
      const btn=e.currentTarget;
      const now=!song.listened;
      btn.className=`listened-badge ${now?'yes':'no'}`;
      btn.textContent=now?'✓ Sí':'— No';
      song.listened=now;
      setSyncing(true);
      try{ await updateDoc(doc(db,'songs',song.id),{listened:now}); }
      catch(err){ setError(); }
      setSyncing(false);
      if(filter!=='all'){
        const ok=(filter==='yes'&&now)||(filter==='not'&&!now);
        if(!ok){
          card.style.transition='opacity .35s,transform .35s';
          card.style.opacity='0'; card.style.transform='scale(.97)';
          setTimeout(()=>render(),360);
        }
      }
    });

    if(adminMode){
      card.querySelector('.delete-btn').addEventListener('click',e=>{e.stopPropagation();openDeleteModal(song.id);});
    }
    grid.appendChild(card);
  });

  if(adminMode){
    const addCard=document.createElement('div');
    addCard.className='add-card';
    addCard.innerHTML=`<div class="add-card-inner"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span>Añadir canción</span></div>`;
    addCard.addEventListener('click',openAddModal);
    grid.appendChild(addCard);
  }
}

// ── ADMIN / PASSWORD ──────────────────────────────────────────────
const adminToggle=document.getElementById('adminToggle');
const pwOverlay  =document.getElementById('pwOverlay');
const pwInput    =document.getElementById('pwInput');
const pwError    =document.getElementById('pwError');
const EDIT_SVG   =`<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="5" height="5" rx="1"/><rect x="9" y="2" width="5" height="5" rx="1"/><rect x="2" y="9" width="5" height="5" rx="1"/><rect x="9" y="9" width="5" height="5" rx="1"/></svg>`;

adminToggle.addEventListener('click',()=>{
  if(adminMode){
    adminMode=false;
    document.body.classList.remove('admin-mode');
    adminToggle.classList.remove('active');
    adminToggle.innerHTML=EDIT_SVG+' Editar';
    render();
  } else {
    pwInput.value=''; pwError.classList.remove('visible');
    pwOverlay.classList.add('open');
    setTimeout(()=>pwInput.focus(),200);
  }
});

function closePw(){ pwOverlay.classList.remove('open'); }
document.getElementById('pwClose').addEventListener('click',closePw);
document.getElementById('pwCancel').addEventListener('click',closePw);
pwOverlay.addEventListener('click',e=>{ if(e.target===pwOverlay) closePw(); });

function tryPassword(){
  if(pwInput.value===ADMIN_PASSWORD){
    closePw(); adminMode=true;
    document.body.classList.add('admin-mode');
    adminToggle.classList.add('active');
    adminToggle.innerHTML=EDIT_SVG+' Salir';
    render();
  } else {
    pwError.classList.add('visible'); pwInput.select();
  }
}
document.getElementById('pwConfirm').addEventListener('click',tryPassword);
pwInput.addEventListener('keydown',e=>{ if(e.key==='Enter') tryPassword(); });

// ── FILTERS ───────────────────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    filter=btn.dataset.filter;
    render();
  });
});

// ── iTUNES SEARCH ─────────────────────────────────────────────────
const searchInput    = document.getElementById('searchInput');
const searchResults  = document.getElementById('searchResults');
const selectedPreview= document.getElementById('selectedPreview');
const previewImg     = document.getElementById('previewImg');
const previewTitle   = document.getElementById('previewTitle');
const previewArtist  = document.getElementById('previewArtist');
const saveBtn        = document.getElementById('modalSave');

function showSearchState(icon, text){
  searchResults.innerHTML=`<div class="search-state">${icon}<div>${text}</div></div>`;
}

async function doSearch(q){
  if(!q.trim()){ searchResults.innerHTML=''; return; }
  showSearchState(
    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
    'Buscando…'
  );
  try{
    const url=`https://itunes.apple.com/search?term=${encodeURIComponent(q)}&entity=song&limit=8&media=music`;
    const res=await fetch(url);
    const data=await res.json();
    renderResults(data.results||[]);
  } catch(e){
    showSearchState(
      `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
      'Error al buscar. Prueba de nuevo.'
    );
  }
}

function renderResults(results){
  if(!results.length){
    showSearchState(
      `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`,
      'Sin resultados. Prueba con otro nombre.'
    );
    return;
  }
  searchResults.innerHTML='';
  results.forEach(track=>{
    const thumb=track.artworkUrl100||track.artworkUrl60||'';
    const item=document.createElement('div');
    item.className='result-item';
    item.innerHTML=`
      ${thumb?`<img class="result-thumb" src="${esc(thumb)}" alt="" loading="lazy">`:`<div class="result-thumb" style="display:flex;align-items:center;justify-content:center;font-size:1.2rem">🎵</div>`}
      <div class="result-info">
        <div class="result-title">${esc(track.trackName||'')}</div>
        <div class="result-artist">${esc(track.artistName||'')} — ${esc(track.collectionName||'')}</div>
      </div>
      <svg class="result-check" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="2 8 6 12 14 4"/></svg>`;
    item.addEventListener('click',()=>selectTrack(track,item));
    searchResults.appendChild(item);
  });
}

function selectTrack(track, itemEl){
  // Deselect others
  searchResults.querySelectorAll('.result-item').forEach(el=>el.classList.remove('selected'));
  itemEl.classList.add('selected');

  selectedTrack=track;

  // Show preview banner
  const thumb=(track.artworkUrl100||track.artworkUrl60||'').replace('100x100','600x600');
  previewImg.src=thumb;
  previewTitle.textContent=track.trackName||'';
  previewArtist.textContent=track.artistName||'';
  selectedPreview.classList.add('visible');

  // Populate manual fields too so user can tweak if needed
  document.getElementById('manualTitle').value=track.trackName||'';
  document.getElementById('manualArtist').value=track.artistName||'';
  document.getElementById('manualCover').value=thumb;
  document.getElementById('manualLink').value=track.trackViewUrl||'';

  saveBtn.disabled=false;
}

document.getElementById('clearSelection').addEventListener('click',()=>{
  selectedTrack=null;
  selectedPreview.classList.remove('visible');
  searchResults.querySelectorAll('.result-item').forEach(el=>el.classList.remove('selected'));
  saveBtn.disabled=true;
  // clear manual fields
  ['manualTitle','manualArtist','manualCover','manualLink'].forEach(id=>document.getElementById(id).value='');
});

searchInput.addEventListener('input',()=>{
  clearTimeout(searchTimer);
  searchTimer=setTimeout(()=>doSearch(searchInput.value),400);
});

// Enable save when manual fields are filled (even without iTunes selection)
function checkManualFill(){
  const t=document.getElementById('manualTitle').value.trim();
  const a=document.getElementById('manualArtist').value.trim();
  saveBtn.disabled=!(t&&a);
}
['manualTitle','manualArtist','manualCover','manualLink'].forEach(id=>{
  document.getElementById(id).addEventListener('input',checkManualFill);
});

// ── ADD MODAL ─────────────────────────────────────────────────────
const modalOverlay=document.getElementById('modalOverlay');

function openAddModal(){
  selectedTrack=null;
  selectedPreview.classList.remove('visible');
  searchInput.value='';
  searchResults.innerHTML='';
  ['manualTitle','manualArtist','manualCover','manualLink'].forEach(id=>document.getElementById(id).value='');
  saveBtn.disabled=true;
  document.getElementById('modalTitle').textContent='Añadir canción';
  modalOverlay.classList.add('open');
  setTimeout(()=>searchInput.focus(),200);
}

function closeModal(){ modalOverlay.classList.remove('open'); }
document.getElementById('modalClose').addEventListener('click',closeModal);
document.getElementById('modalCancel').addEventListener('click',closeModal);
modalOverlay.addEventListener('click',e=>{ if(e.target===modalOverlay) closeModal(); });

document.getElementById('modalSave').addEventListener('click', async()=>{
  // Prefer manual fields (user may have tweaked), fallback to iTunes data
  const title  = document.getElementById('manualTitle').value.trim()  || selectedTrack?.trackName   || '';
  const artist = document.getElementById('manualArtist').value.trim() || selectedTrack?.artistName  || '';
  const cover  = document.getElementById('manualCover').value.trim()  || (selectedTrack?.artworkUrl100||'').replace('100x100','600x600');
  const link   = document.getElementById('manualLink').value.trim()   || selectedTrack?.trackViewUrl || '';

  if(!title||!artist){ return; }

  setSyncing(true);
  try{
    const newId=Date.now().toString();
    await setDoc(doc(db,'songs',newId),{ title, artist, cover, link, listened:false, order:songs.length });
    showToast('Canción añadida ✓');
    closeModal();
  } catch(err){ setError(); console.error(err); }
  setSyncing(false);
});

// ── DELETE ────────────────────────────────────────────────────────
const deleteOverlay =document.getElementById('deleteOverlay');
const deleteSongName=document.getElementById('deleteSongName');

function openDeleteModal(id){
  deletingId=id;
  const s=songs.find(x=>x.id===id);
  deleteSongName.textContent=s?`"${s.title}"`:' esta canción';
  deleteOverlay.classList.add('open');
}
function closeDelete(){ deleteOverlay.classList.remove('open'); deletingId=null; }
document.getElementById('deleteClose').addEventListener('click',closeDelete);
document.getElementById('deleteCancelBtn').addEventListener('click',closeDelete);
deleteOverlay.addEventListener('click',e=>{ if(e.target===deleteOverlay) closeDelete(); });
document.getElementById('deleteConfirmBtn').addEventListener('click', async()=>{
  if(!deletingId) return;
  setSyncing(true);
  try{ await deleteDoc(doc(db,'songs',deletingId)); showToast('Canción eliminada'); }
  catch(err){ setError(); }
  setSyncing(false);
  closeDelete();
});

// ── THEME ─────────────────────────────────────────────────────────
const themeIcon=document.getElementById('themeIcon');
const MOON=`<path d="M13 8A5 5 0 1 1 8 3a3.5 3.5 0 0 0 5 5z" fill="currentColor" stroke="none"/>`;
const SUN =`<circle cx="8" cy="8" r="3"/><line x1="8" y1="1" x2="8" y2="2.5"/><line x1="8" y1="13.5" x2="8" y2="15"/><line x1="1" y1="8" x2="2.5" y2="8"/><line x1="13.5" y1="8" x2="15" y2="8"/><line x1="3" y1="3" x2="4.1" y2="4.1"/><line x1="11.9" y1="11.9" x2="13" y2="13"/><line x1="13" y1="3" x2="11.9" y2="4.1"/><line x1="4.1" y1="11.9" x2="3" y2="13"/>`;
function applyTheme(){ document.body.classList.toggle('dark',darkMode); themeIcon.innerHTML=darkMode?MOON:SUN; }
document.getElementById('themeToggle').addEventListener('click',()=>{ darkMode=!darkMode; localStorage.setItem('mb_dark',darkMode); applyTheme(); });
applyTheme();
</script>
</body>
</html>
